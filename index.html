<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Juicery Audit | جوسري</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            /* Exact Colors from Juicery Logo */
            --logo-orange: #FFB300;
            --logo-pink: #FF006E;
            --logo-yellow: #FFEA00;
            --logo-green: #38B000;
            --bg-color: #1A1A1A; /* Dark charcoal from logo background */
            --card-bg: rgba(45, 45, 45, 0.7);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            /* Fruit pattern inspiration from logo */
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(255, 179, 0, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 90%, rgba(255, 0, 110, 0.05) 0%, transparent 20%);
            color: #FFFFFF;
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex; flex-direction: column;
        }

        .header {
            padding: 50px 20px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
        }

        /* Logo Placeholder - User will replace this with their PNG */
        .logo-container {
            height: 60px;
            margin-bottom: 10px;
            display: flex; justify-content: center; align-items: center;
        }
        .logo-placeholder {
            font-weight: 800; font-size: 1.8rem;
            color: var(--logo-orange);
            text-shadow: 2px 2px var(--logo-pink);
            letter-spacing: -1px;
        }

        .lang-toggle {
            position: absolute; top: 55px; right: 20px;
            background: rgba(255,255,255,0.1); border: none; color: white;
            padding: 5px 12px; border-radius: 12px; font-size: 0.75rem;
        }

        .content { flex: 1; padding: 15px; }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .card-title {
            font-size: 0.8rem; font-weight: 700; color: var(--logo-orange);
            margin-bottom: 10px; text-transform: uppercase;
            display: flex; justify-content: space-between;
        }

        .input-row {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .field { display: flex; flex-direction: column; gap: 5px; }
        .label { font-size: 0.6rem; color: #888; text-align: center; font-weight: 700; }

        input {
            background: #252525; border: 1px solid #333; border-radius: 10px;
            color: white; padding: 12px 0; text-align: center;
            font-size: 1.1rem; font-weight: 700; outline: none; width: 100%;
        }

        input:focus {
            border-color: var(--logo-pink);
            background: #2a2a2a;
        }

        .calc-btn {
            width: 100%; 
            background: linear-gradient(90deg, var(--logo-orange), var(--logo-pink));
            border: none; color: white; padding: 18px; border-radius: 15px;
            font-size: 1.1rem; font-weight: 800; margin: 20px 0;
            box-shadow: 0 5px 20px rgba(255, 0, 110, 0.3);
        }

        .result-panel {
            background: #FFFFFF; border-radius: 25px; padding: 25px;
            color: #1A1A1A; text-align: center; margin-bottom: 50px;
        }

        .yield-num { font-size: 3.5rem; font-weight: 800; display: block; margin: 5px 0; letter-spacing: -2px; }
        .status { font-weight: 800; font-size: 0.9rem; padding: 5px 15px; border-radius: 50px; background: #f0f0f0; }

        body.rtl { direction: rtl; }
        body.rtl .lang-toggle { right: auto; left: 20px; }
    </style>
</head>
<body id="bdy">

    <header class="header">
        <div class="logo-container">
            <!-- User: Place your logo.png here -->
            <div class="logo-placeholder">JUICERY</div>
        </div>
        <button class="lang-toggle" onclick="toggleLang()">🌐 <span id="l-btn">العربية</span></button>
    </header>

    <main class="content">
        <!-- Cartons -->
        <div class="card" style="border-left: 5px solid var(--logo-orange);">
            <div class="card-title" id="t-cartons">Total Cartons Used</div>
            <input type="tel" id="cartons" placeholder="0" oninput="calc()">
        </div>

        <!-- Juices -->
        <div class="card">
            <div class="card-title"><span><span id="t1">Orange Juice</span></span> <span style="color:var(--logo-green)">100%</span></div>
            <div class="input-row">
                <div class="field"><span class="label">330ML</span><input type="tel" class="oj" oninput="calc()"></div>
                <div class="field"><span class="label">500ML</span><input type="tel" class="oj" oninput="calc()"></div>
                <div class="field"><span class="label">1L</span><input type="tel" class="oj" oninput="calc()"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><span><span id="t2">Orange & Carrot</span></span> <span style="color:var(--logo-green)">50%</span></div>
            <div class="input-row">
                <div class="field"><span class="label">330ML</span><input type="tel" class="oc" oninput="calc()"></div>
                <div class="field"><span class="label">500ML</span><input type="tel" class="oc" oninput="calc()"></div>
                <div class="field"><span class="label">1L</span><input type="tel" class="oc" oninput="calc()"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><span><span id="t3">Beetroot & Orange</span></span> <span style="color:var(--logo-green)">75%</span></div>
            <div class="input-row">
                <div class="field"><span class="label">330ML</span><input type="tel" class="ob" oninput="calc()"></div>
                <div class="field"><span class="label">500ML</span><input type="tel" class="ob" oninput="calc()"></div>
                <div class="field"><span class="label">1L</span><input type="tel" class="ob" oninput="calc()"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><span><span id="t4">Pineapple & Orange</span></span> <span style="color:var(--logo-green)">75%</span></div>
            <div class="input-row">
                <div class="field"><span class="label">330ML</span><input type="tel" class="op" oninput="calc()"></div>
                <div class="field"><span class="label">500ML</span><input type="tel" class="op" oninput="calc()"></div>
                <div class="field"><span class="label">1L</span><input type="tel" class="op" oninput="calc()"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><span><span id="t5">Green Detox</span></span> <span style="color:var(--logo-green)">25%</span></div>
            <div class="input-row">
                <div class="field"><span class="label">330ML</span><input type="tel" class="gd" oninput="calc()"></div>
                <div class="field"><span class="label">500ML</span><input type="tel" class="gd" oninput="calc()"></div>
                <div class="field"><span class="label">1L</span><input type="tel" class="gd" oninput="calc()"></div>
            </div>
        </div>

        <button class="calc-btn" onclick="calc()" id="b-calc">CALCULATE AUDIT</button>

        <div class="result-panel">
            <span style="font-size: 0.8rem; font-weight: 800; opacity: 0.5;" id="r-head">LITERS PER CARTON</span>
            <span class="yield-num" id="res">0.00</span>
            <div class="status" id="sts">WAITING...</div>
        </div>
    </main>

    <script>
        var lang = 'en';
        var strings = {
            en: {
                cartons: "Total Cartons Used", oj: "Orange Juice", oc: "Orange & Carrot", ob: "Beetroot & Orange",
                op: "Pineapple & Orange", gd: "Green Detox", btn: "CALCULATE AUDIT", rHead: "LITERS PER CARTON",
                wait: "WAITING...", exc: "EXCELLENT ✅", norm: "NORMAL 🆗", low: "LOW ⚠️", theft: "LOSS 🚫"
            },
            ar: {
                cartons: "إجمالي كراتين البرتقال", oj: "عصير برتقال", oc: "برتقال وجزر", ob: "شمندر وبرتقال",
                op: "أناناس وبرتقال", gd: "ديتوكس أخضر", btn: "احسب النتائج الآن", rHead: "المعدل لكل كرتون",
                wait: "بانتظار البيانات...", exc: "ممتاز ✅", norm: "طبيعي 🆗", low: "هدر ⚠️", theft: "هدر عالٍ 🚫"
            }
        };

        function toggleLang() {
            lang = (lang === 'en') ? 'ar' : 'en';
            document.getElementById('bdy').className = (lang === 'ar') ? 'rtl' : '';
            var s = strings[lang];
            document.getElementById('l-btn').innerText = (lang === 'en') ? 'العربية' : 'English';
            document.getElementById('t-cartons').innerText = s.cartons;
            document.getElementById('t1').innerText = s.oj; document.getElementById('t2').innerText = s.oc;
            document.getElementById('t3').innerText = s.ob; document.getElementById('t4').innerText = s.op;
            document.getElementById('t5').innerText = s.gd; document.getElementById('b-calc').innerText = s.btn;
            document.getElementById('r-head').innerText = s.rHead;
            calc();
        }

        function getV(id_cl, idx) {
            var el = (idx !== undefined) ? document.getElementsByClassName(id_cl)[idx] : document.getElementById(id_cl);
            var n = parseFloat(el.value);
            return isNaN(n) ? 0 : n;
        }

        function calc() {
            var s = strings[lang];
            var oj = (getV('oj',0)*0.33 + getV('oj',1)*0.5 + getV('oj',2)*1.0) * 1.0;
            var oc = (getV('oc',0)*0.33 + getV('oc',1)*0.5 + getV('oc',2)*1.0) * 0.5;
            var ob = (getV('ob',0)*0.33 + getV('ob',1)*0.5 + getV('ob',2)*1.0) * 0.75;
            var op = (getV('op',0)*0.33 + getV('op',1)*0.5 + getV('op',2)*1.0) * 0.75;
            var gd = (getV('gd',0)*0.33 + getV('gd',1)*0.5 + getV('gd',2)*1.0) * 0.25;

            var total = oj + oc + ob + op + gd;
            var carts = getV('cartons');
            var res = document.getElementById('res');
            var sts = document.getElementById('sts');

            if (carts > 0 && total > 0) {
                var v = total / carts;
                res.innerText = v.toFixed(2);
                if (v >= 7.1) sts.innerText = s.exc;
                else if (v >= 6.7) sts.innerText = s.norm;
                else if (v >= 6.0) sts.innerText = s.low;
                else sts.innerText = s.theft;
            } else {
                res.innerText = "0.00"; sts.innerText = s.wait;
            }
        }

        // Space/Enter Jumps
        var ins = document.querySelectorAll('input');
        ins.forEach(function(input, i) {
            input.addEventListener('keydown', function(e) {
                if (e.keyCode === 32 || e.keyCode === 13) {
                    e.preventDefault();
                    if (ins[i+1]) { ins[i+1].focus(); ins[i+1].select(); ins[i+1].scrollIntoView({behavior:'smooth', block:'center'}); }
                }
            });
        });
    </script>
</body>
</html>
