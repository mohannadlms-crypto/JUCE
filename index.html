<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Juicery | Smart Audit</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #FF9F00;
            --pink: #E91E63;
            --yellow: #FFD600;
            --brand-dark: #121212;
            --glass: rgba(255, 255, 255, 0.04);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--brand-dark);
            color: white; margin: 0; padding: 0; 
            min-height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Ccircle cx='20' cy='20' r='5'/%3E%3C/g%3E%3C/svg%3E");
        }

        .header {
            padding: 45px 12px 5px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: var(--brand-dark); z-index: 100;
        }

        .logo-box { text-align: left; }
        .logo-text-v {
            font-family: 'Fredoka', sans-serif; font-size: 1.35rem; font-weight: 700;
            background: linear-gradient(to right, var(--yellow), var(--orange));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .arabic-sub { font-size: 0.6rem; color: var(--pink); font-weight: 900; margin-top: -3px; display: block; }

        .lang-btn {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 5px 10px; border-radius: 10px; font-size: 0.65rem; font-weight: 700;
        }

        .content { padding: 5px 8px 115px; }

        .card-row {
            background: var(--glass); border-radius: 12px; padding: 8px 10px;
            display: flex; align-items: center; gap: 10px;
            border: 1px solid rgba(255,255,255,0.03); margin-bottom: 4px;
        }

        .row-title { font-size: 0.65rem; font-weight: 900; color: var(--orange); width: 80px; flex-shrink: 0; line-height: 1.1; }

        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; flex-grow: 1; }
        .input-box { display: flex; flex-direction: column; gap: 1px; }
        .label { font-size: 0.5rem; color: #666; text-align: center; font-weight: 800; }

        input {
            background: rgba(0,0,0,0.4); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 8px;
            color: white; padding: 6px 0; text-align: center; font-size: 1rem; font-weight: 700; outline: none; width: 100%;
        }
        input:focus { border-color: var(--pink); background: rgba(0,0,0,0.6); }

        .result-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(18, 18, 18, 0.98); border-top: 2px solid var(--orange);
            padding: 12px 15px calc(10px + env(safe-area-inset-bottom));
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 200; box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .res-main { text-align: left; }
        .res-label { font-size: 0.6rem; font-weight: 900; color: var(--orange); opacity: 0.8; text-transform: uppercase; }
        .res-num { font-size: 2.6rem; font-weight: 900; color: white; line-height: 1; }
        .res-sts { font-size: 0.8rem; font-weight: 900; color: var(--pink); }

        .res-details { font-size: 0.65rem; color: #eee; text-align: right; line-height: 1.4; width: 55%; max-height: 95px; overflow-y: auto; }
        .det-title { color: var(--yellow); font-weight: 900; display: block; border-bottom: 0.5px solid #444; margin-bottom: 4px; font-size: 0.7rem; }
        .det-item { display: flex; justify-content: space-between; margin-bottom: 2px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 2px; }
        .det-val { color: var(--orange); font-weight: 900; }

        body.rtl { direction: rtl; }
        body.rtl .logo-box { text-align: right; }
        body.rtl .res-main { text-align: right; }
        body.rtl .res-details { text-align: left; }
    </style>
</head>
<body id="bdy">

    <header class="header">
        <div class="logo-box">
            <h1 class="logo-text-v">Juicery</h1>
            <span class="arabic-sub">جوسري</span>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
            <div id="t-cartons" style="font-size:0.6rem; font-weight:900; color:var(--orange);">CARTONS:</div>
            <input type="tel" id="cartons" placeholder="0" oninput="calc()" style="width:50px; padding:5px 0; font-size:0.95rem;">
            <button class="lang-btn" onclick="toggleLang()">🌐 <span id="l-btn">AR</span></button>
        </div>
    </header>

    <main class="content">
        <div class="card-row"><div class="row-title" id="t1">Orange Juice</div><div class="inputs-grid"><div class="input-box"><span class="label">330</span><input type="tel" class="oj" oninput="calc()"></div><div class="input-box"><span class="label">500</span><input type="tel" class="oj" oninput="calc()"></div><div class="input-box"><span class="label">1L</span><input type="tel" class="oj" oninput="calc()"></div></div></div>
        <div class="card-row"><div class="row-title" id="t2">Orange & Carrot</div><div class="inputs-grid"><div class="input-box"><span class="label">330</span><input type="tel" class="oc" oninput="calc()"></div><div class="input-box"><span class="label">500</span><input type="tel" class="oc" oninput="calc()"></div><div class="input-box"><span class="label">1L</span><input type="tel" class="oc" oninput="calc()"></div></div></div>
        <div class="card-row"><div class="row-title" id="t3">Beetroot & Orange</div><div class="inputs-grid"><div class="input-box"><span class="label">330</span><input type="tel" class="ob" oninput="calc()"></div><div class="input-box"><span class="label">500</span><input type="tel" class="ob" oninput="calc()"></div><div class="input-box"><span class="label">1L</span><input type="tel" class="ob" oninput="calc()"></div></div></div>
        <div class="card-row"><div class="row-title" id="t4">Pineapple & Orange</div><div class="inputs-grid"><div class="input-box"><span class="label">330</span><input type="tel" class="op" oninput="calc()"></div><div class="input-box"><span class="label">500</span><input type="tel" class="op" oninput="calc()"></div><div class="input-box"><span class="label">1L</span><input type="tel" class="op" oninput="calc()"></div></div></div>
        <div class="card-row"><div class="row-title" id="t5">Green Detox</div><div class="inputs-grid"><div class="input-box"><span class="label">330</span><input type="tel" class="gd" oninput="calc()"></div><div class="input-box"><span class="label">500</span><input type="tel" class="gd" oninput="calc()"></div><div class="input-box"><span class="label">1L</span><input type="tel" class="gd" oninput="calc()"></div></div></div>
    </main>

    <div class="result-panel">
        <div class="res-main">
            <div class="res-label" id="r-head">TOTAL ORANGE</div>
            <div class="res-num" id="res-num">0.00</div>
            <div class="res-status" id="res-sts">...</div>
        </div>
        <div class="res-details" id="details-area">
            <span class="det-title" id="d-title">ORANGE BREAKDOWN:</span>
            <div id="d-body">...</div>
        </div>
    </div>

    <script>
        var lang = 'en';
        var strings = {
            en: { cartons: "CARTONS:", oj: "Orange Juice", oc: "Orange & Carrot", ob: "Beetroot & Orange", op: "Pineapple & Orange", gd: "Green Detox", rHead: "YIELD L/C", totalLabel: "TOTAL ORANGE (L)", wait: "...", exc: "EXCELLENT ✅", norm: "NORMAL 🆗", low: "LOW ⚠️", theft: "LOSS 🚫", dTitle: "ORANGE BREAKDOWN:", waitMsg: "Waiting...", totalOrange: "Total Orange: " },
            ar: { cartons: "الكراتين:", oj: "عصير برتقال", oc: "برتقال وجزر", ob: "شمندر وبرتقال", op: "أناناس وبرتقال", gd: "ديتوكس أخضر", rHead: "المعدل L/C", totalLabel: "إجمالي البرتقال (لتر)", wait: "...", exc: "ممتاز ✅", norm: "طبيعي 🆗", low: "هدر ⚠️", theft: "هدر عالٍ 🚫", dTitle: "تفصيل البرتقال:", waitMsg: "بانتظار البيانات...", totalOrange: "إجمالي البرتقال: " }
        };

        function toggleLang() {
            lang = (lang === 'en') ? 'ar' : 'en';
            document.getElementById('bdy').className = (lang === 'ar') ? 'rtl' : '';
            var s = strings[lang];
            document.getElementById('l-btn').innerText = (lang === 'en') ? 'AR' : 'EN';
            document.getElementById('t-cartons').innerText = s.cartons;
            document.getElementById('t1').innerText = s.oj; document.getElementById('t2').innerText = s.oc;
            document.getElementById('t3').innerText = s.ob; document.getElementById('t4').innerText = s.op;
            document.getElementById('t5').innerText = s.gd;
            document.getElementById('d-title').innerText = s.dTitle;
            calc();
        }

        function getV(cls, idx) {
            var el = document.getElementsByClassName(cls)[idx];
            if (!el) return document.getElementById(cls) ? parseFloat(document.getElementById(cls).value) || 0 : 0;
            return parseFloat(el.value) || 0;
        }

        function calc() {
            var s = strings[lang];
            var v_oj = (getV('oj',0)*0.33 + getV('oj',1)*0.5 + getV('oj',2)*1.0);
            var v_oc = (getV('oc',0)*0.33 + getV('oc',1)*0.5 + getV('oc',2)*1.0) * 0.5;
            var v_ob = (getV('ob',0)*0.33 + getV('ob',1)*0.5 + getV('ob',2)*1.0) * 0.75;
            var v_op = (getV('op',0)*0.33 + getV('op',1)*0.5 + getV('op',2)*1.0) * 0.75;
            var v_gd = (getV('gd',0)*0.33 + getV('gd',1)*0.5 + getV('gd',2)*1.0) * 0.25;

            var total = v_oj + v_oc + v_ob + v_op + v_gd;
            var carts = getV('cartons');
            var std = 7.0;
            
            var resLabel = document.getElementById('r-head');
            var resNum = document.getElementById('res-num');
            var sts = document.getElementById('res-sts');
            var det = document.getElementById('d-body');

            if (total > 0) {
                var html = '';
                if (v_oj > 0) html += '<div class="det-item"><span>'+s.oj+'</span><span class="det-val">'+v_oj.toFixed(2)+'L</span></div>';
                if (v_oc > 0) html += '<div class="det-item"><span>'+s.oc+'</span><span class="det-val">'+v_oc.toFixed(2)+'L</span></div>';
                if (v_ob > 0) html += '<div class="det-item"><span>'+s.ob+'</span><span class="det-val">'+v_ob.toFixed(2)+'L</span></div>';
                if (v_op > 0) html += '<div class="det-item"><span>'+s.op+'</span><span class="det-val">'+v_op.toFixed(2)+'L</span></div>';
                if (v_gd > 0) html += '<div class="det-item"><span>'+s.gd+'</span><span class="det-val">'+v_gd.toFixed(2)+'L</span></div>';
                
                html += '<div style="font-weight:900; color:var(--pink); margin-top:4px; font-size:0.75rem;">'+s.totalOrange+total.toFixed(2)+'L</div>';
                det.innerHTML = html;

                if (carts > 0) {
                    // Calculate Yield per Carton
                    resLabel.innerText = s.rHead;
                    var v = total / carts;
                    resNum.innerText = v.toFixed(2);
                    if (v >= std + 0.1) sts.innerText = s.exc;
                    else if (v >= std - 0.3) sts.innerText = s.norm;
                    else if (v >= std - 1.0) sts.innerText = s.low;
                    else sts.innerText = s.theft;
                } else {
                    // Just show Total Orange
                    resLabel.innerText = s.totalLabel;
                    resNum.innerText = total.toFixed(2);
                    sts.innerText = "...";
                }
            } else {
                resLabel.innerText = s.totalLabel;
                resNum.innerText = "0.00"; 
                sts.innerText = s.wait;
                det.innerHTML = s.waitMsg;
            }
        }

        var ins = document.querySelectorAll('input');
        ins.forEach(function(input, i) {
            input.addEventListener('keydown', function(e) {
                if (e.keyCode === 32 || e.keyCode === 13) {
                    e.preventDefault();
                    if (ins[i+1]) { ins[i+1].focus(); ins[i+1].select(); }
                }
            });
        });
    </script>
</body>
</html>
