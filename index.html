<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Juicery | Vivid Audit</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #FF9F00;
            --pink: #E91E63;
            --yellow: #FFD600;
            --brand-dark: #121212;
            --glass: rgba(255, 255, 255, 0.04);
            /* Juice Colors */
            --c-oj: #FF9F00; /* Pure Orange */
            --c-oc: #FF5722; /* Carrot Red-Orange */
            --c-ob: #C2185B; /* Beetroot Purple-Red */
            --c-op: #FFD600; /* Pineapple Yellow */
            --c-gd: #4CAF50; /* Green Detox */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--brand-dark);
            color: white; margin: 0; padding: 0; 
            min-height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Ccircle cx='20' cy='20' r='5'/%3E%3C/g%3E%3C/svg%3E");
        }

        .header {
            padding: 45px 12px 5px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: var(--brand-dark); z-index: 100;
        }

        .logo-box { text-align: left; }
        .logo-text-v {
            font-family: 'Fredoka', sans-serif; font-size: 1.35rem; font-weight: 700;
            background: linear-gradient(to right, var(--yellow), var(--orange));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .arabic-sub { font-size: 0.6rem; color: var(--pink); font-weight: 900; margin-top: -3px; display: block; }

        .top-actions { display: flex; align-items: center; gap: 8px; }

        .clear-btn {
            background: rgba(233, 30, 99, 0.1); border: 1px solid var(--pink);
            color: var(--pink); padding: 5px 10px; border-radius: 8px; 
            font-size: 0.6rem; font-weight: 900; text-transform: uppercase;
        }

        .lang-btn {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 5px 10px; border-radius: 8px; font-size: 0.6rem; font-weight: 700;
        }

        .content { padding: 5px 8px 0; display: flex; flex-direction: column; }

        .card-row {
            background: var(--glass); border-radius: 12px; padding: 8px 10px;
            display: flex; align-items: center; gap: 10px;
            border: 1px solid rgba(255,255,255,0.03); margin-bottom: 4px;
        }

        .row-title { font-size: 0.65rem; font-weight: 900; width: 80px; flex-shrink: 0; line-height: 1.1; }
        /* Juice Color Classes */
        .oj-text { color: var(--c-oj); }
        .oc-text { color: var(--c-oc); }
        .ob-text { color: var(--c-ob); }
        .op-text { color: var(--c-op); }
        .gd-text { color: var(--c-gd); }

        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; flex-grow: 1; }
        .input-box { display: flex; flex-direction: column; gap: 1px; }
        .label { font-size: 0.5rem; color: #666; text-align: center; font-weight: 800; }

        input {
            background: rgba(0,0,0,0.4); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 8px;
            color: white; padding: 6px 0; text-align: center; font-size: 1rem; font-weight: 700; outline: none; width: 100%;
        }
        input:focus { border-color: var(--pink); background: rgba(0,0,0,0.6); }

        /* Unified Result Box - Attached to the last row */
        .result-panel {
            background: rgba(25, 25, 25, 1); 
            border-top: 3px solid var(--orange);
            padding: 15px 15px 40px; /* More bottom padding for thumb area */
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 0; /* NO GAP */
            box-shadow: 0 -15px 35px rgba(0,0,0,0.8);
            border-bottom-left-radius: 0; border-bottom-right-radius: 0;
        }

        .res-main { text-align: left; }
        .res-label { font-size: 0.75rem; font-weight: 900; color: var(--orange); opacity: 0.8; text-transform: uppercase; }
        .res-num { font-size: 3.5rem; font-weight: 900; color: white; line-height: 0.9; margin: 5px 0; }
        .res-sts { font-size: 1rem; font-weight: 900; color: var(--pink); }

        .res-details { font-size: 0.8rem; color: #eee; text-align: right; line-height: 1.5; width: 55%; }
        .det-title { color: var(--yellow); font-weight: 900; display: block; border-bottom: 1px solid #444; margin-bottom: 6px; font-size: 0.85rem; padding-bottom: 4px; }
        .det-item { display: flex; justify-content: space-between; margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px; }
        .det-val { font-weight: 900; }
        .formula-line { font-size: 0.6rem; color: #888; font-family: monospace; display: block; margin-top: 8px; }

        body.rtl { direction: rtl; }
        body.rtl .logo-box { text-align: right; }
        body.rtl .res-main { text-align: right; }
        body.rtl .res-details { text-align: left; }
    </style>
</head>
<body id="bdy">

    <header class="header">
        <div class="logo-box">
            <h1 class="logo-text-v">Juicery</h1>
            <span class="arabic-sub">جوسري</span>
        </div>
        <div class="top-actions">
            <div id="t-cartons" style="font-size:0.6rem; font-weight:900; color:var(--orange);">CARTONS:</div>
            <input type="tel" id="cartons" placeholder="0" oninput="calc()" style="width:45px; padding:5px 0; font-size:0.95rem;">
            <button class="clear-btn" onclick="clearAll()" id="b-clear">Clear</button>
            <button class="lang-btn" onclick="toggleLang()">🌐 <span id="l-btn">AR</span></button>
        </div>
    </header>

    <main class="content">
        <div class="card-row"><div class="row-title oj-text" id="t1">Orange Juice</div><div class="inputs-grid"><div class="input-box"><span class="label">330</span><input type="tel" class="oj" oninput="calc()"></div><div class="input-box"><span class="label">500</span><input type="tel" class="oj" oninput="calc()"></div><div class="input-box"><span class="label">1L</span><input type="tel" class="oj" oninput="calc()"></div></div></div>
        <div class="card-row"><div class="row-title oc-text" id="t2">Orange & Carrot</div><div class="inputs-grid"><div class="input-box"><span class="label">330</span><input type="tel" class="oc" oninput="calc()"></div><div class="input-box"><span class="label">500</span><input type="tel" class="oc" oninput="calc()"></div><div class="input-box"><span class="label">1L</span><input type="tel" class="oc" oninput="calc()"></div></div></div>
        <div class="card-row"><div class="row-title ob-text" id="t3">Beetroot & Orange</div><div class="inputs-grid"><div class="input-box"><span class="label">330</span><input type="tel" class="ob" oninput="calc()"></div><div class="input-box"><span class="label">500</span><input type="tel" class="ob" oninput="calc()"></div><div class="input-box"><span class="label">1L</span><input type="tel" class="ob" oninput="calc()"></div></div></div>
        <div class="card-row"><div class="row-title op-text" id="t4">Pineapple & Orange</div><div class="inputs-grid"><div class="input-box"><span class="label">330</span><input type="tel" class="op" oninput="calc()"></div><div class="input-box"><span class="label">500</span><input type="tel" class="op" oninput="calc()"></div><div class="input-box"><span class="label">1L</span><input type="tel" class="op" oninput="calc()"></div></div></div>
        <div class="card-row" style="margin-bottom:0; border-bottom-left-radius:0; border-bottom-right-radius:0;"><div class="row-title gd-text" id="t5">Green Detox</div><div class="inputs-grid"><div class="input-box"><span class="label">330</span><input type="tel" class="gd" oninput="calc()"></div><div class="input-box"><span class="label">500</span><input type="tel" class="gd" oninput="calc()"></div><div class="input-box"><span class="label">1L</span><input type="tel" class="gd" oninput="calc()"></div></div></div>

        <!-- Result Box (Unified & Larger) -->
        <div class="result-panel">
            <div class="res-main">
                <div class="res-label" id="r-head">TOTAL ORANGE</div>
                <div class="res-num" id="res-num">0.00</div>
                <div class="res-sts" id="res-sts">...</div>
            </div>
            <div class="res-details" id="details-area">
                <span class="det-title" id="d-title">ORANGE BREAKDOWN:</span>
                <div id="d-body">...</div>
            </div>
        </div>
    </main>

    <script>
        var lang = 'en';
        var strings = {
            en: { cartons: "CARTONS:", oj: "Orange Juice", oc: "Orange & Carrot", ob: "Beetroot & Orange", op: "Pineapple & Orange", gd: "Green Detox", rHead: "YIELD L/C", totalLabel: "TOTAL ORANGE (L)", wait: "...", exc: "EXCELLENT ✅", norm: "NORMAL 🆗", low: "LOW ⚠️", theft: "LOSS 🚫", dTitle: "ORANGE BREAKDOWN:", waitMsg: "Waiting...", totalOrange: "Total Orange: ", formula: "Formula: ", clear: "Clear" },
            ar: { cartons: "الكراتين:", oj: "عصير برتقال", oc: "برتقال وجزر", ob: "شمندر وبرتقال", op: "أناناس وبرتقال", gd: "ديتوكس أخضر", rHead: "المعدل L/C", totalLabel: "إجمالي البرتقال (لتر)", wait: "...", exc: "ممتاز ✅", norm: "طبيعي 🆗", low: "هدر ⚠️", theft: "هدر عالٍ 🚫", dTitle: "تفصيل البرتقال:", waitMsg: "بانتظار البيانات...", totalOrange: "إجمالي البرتقال: ", formula: "الحسبة: ", clear: "مسح" }
        };

        function toggleLang() {
            lang = (lang === 'en') ? 'ar' : 'en';
            document.getElementById('bdy').className = (lang === 'ar') ? 'rtl' : '';
            var s = strings[lang];
            document.getElementById('l-btn').innerText = (lang === 'en') ? 'AR' : 'EN';
            document.getElementById('t-cartons').innerText = s.cartons;
            document.getElementById('t1').innerText = s.oj; document.getElementById('t2').innerText = s.oc;
            document.getElementById('t3').innerText = s.ob; document.getElementById('t4').innerText = s.op;
            document.getElementById('t5').innerText = s.gd;
            document.getElementById('d-title').innerText = s.dTitle;
            document.getElementById('b-clear').innerText = s.clear;
            calc();
        }

        function clearAll() {
            if (confirm(lang === 'en' ? "Clear all data?" : "هل تريد مسح جميع البيانات؟")) {
                var inputs = document.querySelectorAll('input');
                inputs.forEach(function(input) { input.value = ''; });
                calc();
            }
        }

        function parseN(val) {
            if (!val) return 0;
            var ar = {'٠':0,'١':1,'٢':2,'٣':3,'٤':4,'٥':5,'٦':6,'٧':7,'٨':8,'٩':9};
            var s = val.toString().replace(/[٠-٩]/g, function(d) { return ar[d]; });
            s = s.replace(/,/g, '.');
            return parseFloat(s) || 0;
        }

        function getV(cls, idx) {
            var el = document.getElementsByClassName(cls)[idx];
            if (!el) return document.getElementById(cls) ? parseN(document.getElementById(cls).value) : 0;
            return parseN(el.value);
        }

        function calc() {
            var s = strings[lang];
            var v_oj = (getV('oj',0)*0.33 + getV('oj',1)*0.5 + getV('oj',2)*1.0);
            var v_oc = (getV('oc',0)*0.33 + getV('oc',1)*0.5 + getV('oc',2)*1.0) * 0.5;
            var v_ob = (getV('ob',0)*0.33 + getV('ob',1)*0.5 + getV('ob',2)*1.0) * 0.75;
            var v_op = (getV('op',0)*0.33 + getV('op',1)*0.5 + getV('op',2)*1.0) * 0.75;
            var v_gd = (getV('gd',0)*0.33 + getV('gd',1)*0.5 + getV('gd',2)*1.0) * 0.25;

            var total = v_oj + v_oc + v_ob + v_op + v_gd;
            var carts = getV('cartons', 0);
            var std = 7.0;
            
            var resLabel = document.getElementById('r-head');
            var resNum = document.getElementById('res-num');
            var sts = document.getElementById('res-sts');
            var det = document.getElementById('d-body');

            if (total > 0) {
                var html = '';
                if (v_oj > 0) html += '<div class="det-item oj-text"><span>'+s.oj+'</span><span class="det-val">'+v_oj.toFixed(2)+'L</span></div>';
                if (v_oc > 0) html += '<div class="det-item oc-text"><span>'+s.oc+'</span><span class="det-val">'+v_oc.toFixed(2)+'L</span></div>';
                if (v_ob > 0) html += '<div class="det-item ob-text"><span>'+s.ob+'</span><span class="det-val">'+v_ob.toFixed(2)+'L</span></div>';
                if (v_op > 0) html += '<div class="det-item op-text"><span>'+s.op+'</span><span class="det-val">'+v_op.toFixed(2)+'L</span></div>';
                if (v_gd > 0) html += '<div class="det-item gd-text"><span>'+s.gd+'</span><span class="det-val">'+v_gd.toFixed(2)+'L</span></div>';
                
                html += '<div style="font-weight:900; color:var(--pink); margin-top:8px; font-size:1rem;">'+s.totalOrange+total.toFixed(2)+'L</div>';

                if (carts > 0) {
                    resLabel.innerText = s.rHead;
                    var v = total / carts;
                    resNum.innerText = v.toFixed(2);
                    if (v >= std + 0.1) sts.innerText = s.exc;
                    else if (v >= std - 0.3) sts.innerText = s.norm;
                    else if (v >= std - 1.0) sts.innerText = s.low;
                    else sts.innerText = s.theft;
                    html += '<span class="formula-line">'+s.formula+total.toFixed(2)+' / '+carts+' = '+v.toFixed(2)+'</span>';
                } else {
                    resLabel.innerText = s.totalLabel;
                    resNum.innerText = total.toFixed(2);
                    sts.innerText = "...";
                }
                det.innerHTML = html;
            } else {
                resLabel.innerText = s.totalLabel;
                resNum.innerText = "0.00"; 
                sts.innerText = s.wait;
                det.innerHTML = s.waitMsg;
            }
        }

        var ins = document.querySelectorAll('input');
        ins.forEach(function(input, i) {
            input.addEventListener('keydown', function(e) {
                if (e.keyCode === 32 || e.keyCode === 13) {
                    e.preventDefault();
                    if (ins[i+1]) { ins[i+1].focus(); ins[i+1].select(); }
                }
            });
        });
    </script>
</body>
</html>
